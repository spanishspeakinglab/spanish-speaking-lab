<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjetas de Identidad — ¿Quién eres tú?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --y7: #FF6B6B; --y7b: #FFE66D; --y7c: #4ECDC4;
    --y8: #45B7D1; --y8b: #96CEB4; --y8c: #FFEAA7;
    --y9: #6BCB77; --y9b: #4D96FF; --y9c: #FFD93D;
    --y10: #C77DFF; --y10b: #FF9A3C; --y10c: #06D6A0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    padding: 30px 20px;
    min-height: 100vh;
  }

  .page-title {
    text-align: center;
    margin-bottom: 40px;
  }
  .page-title h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.8rem;
    background: linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4, #C77DFF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .page-title p {
    color: #aaa;
    font-size: 1rem;
    font-weight: 600;
  }

  .year-section {
    margin-bottom: 50px;
  }

  .year-label {
    display: inline-block;
    font-family: 'Pacifico', cursive;
    font-size: 1.4rem;
    padding: 8px 24px;
    border-radius: 50px;
    margin-bottom: 24px;
    color: #fff;
    letter-spacing: 1px;
  }
  .y7-label { background: linear-gradient(135deg, var(--y7), var(--y7b)); }
  .y8-label { background: linear-gradient(135deg, var(--y8), var(--y8b)); }
  .y9-label { background: linear-gradient(135deg, var(--y9), var(--y9b)); }
  .y10-label { background: linear-gradient(135deg, var(--y10), var(--y10b)); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .card {
    border-radius: 20px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    page-break-inside: avoid;
    break-inside: avoid;
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-4px); }

  .card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    border-radius: 50%;
    opacity: 0.25;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 70px; height: 70px;
    border-radius: 50%;
    opacity: 0.2;
  }

  /* Year 7 cards */
  .card-y7 { background: linear-gradient(145deg, #fff5f5, #fff9e6); border: 3px solid var(--y7); }
  .card-y7::before { background: var(--y7); }
  .card-y7::after { background: var(--y7b); }
  .card-y7 .card-header { background: linear-gradient(135deg, var(--y7), #ff8e53); }

  /* Year 8 cards */
  .card-y8 { background: linear-gradient(145deg, #f0f9ff, #f0fff8); border: 3px solid var(--y8); }
  .card-y8::before { background: var(--y8); }
  .card-y8::after { background: var(--y8b); }
  .card-y8 .card-header { background: linear-gradient(135deg, var(--y8), var(--y8b)); }

  /* Year 9 cards */
  .card-y9 { background: linear-gradient(145deg, #f0fff4, #fffbf0); border: 3px solid var(--y9); }
  .card-y9::before { background: var(--y9); }
  .card-y9::after { background: var(--y9c); }
  .card-y9 .card-header { background: linear-gradient(135deg, var(--y9), var(--y9b)); }

  /* Year 10 cards */
  .card-y10 { background: linear-gradient(145deg, #fdf5ff, #fff8f0); border: 3px solid var(--y10); }
  .card-y10::before { background: var(--y10); }
  .card-y10::after { background: var(--y10b); }
  .card-y10 .card-header { background: linear-gradient(135deg, var(--y10), var(--y10b)); }

  .card-header {
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .flag { font-size: 1.4rem; }
  .card-header .label {
    color: white;
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .card-name {
    font-family: 'Pacifico', cursive;
    font-size: 1.15rem;
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .card-y7 .card-name { color: var(--y7); }
  .card-y8 .card-name { color: var(--y8); }
  .card-y9 .card-name { color: var(--y9b); }
  .card-y10 .card-name { color: var(--y10); }

  .card-lines { list-style: none; }
  .card-lines li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 0.88rem;
    font-weight: 700;
    color: #333;
    padding: 5px 0;
    border-bottom: 1px dashed #e0e0e0;
    line-height: 1.4;
  }
  .card-lines li:last-child { border-bottom: none; }
  .card-lines li .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

  .card-lines li .translation {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: #999;
    margin-top: 1px;
  }

  .print-tip {
    text-align: center;
    margin-top: 50px;
    padding: 16px 24px;
    background: rgba(255,255,255,0.08);
    border-radius: 12px;
    color: #aaa;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .print-tip strong { color: #fff; }

  .cut-line {
    border: none;
    border-top: 2px dashed rgba(255,255,255,0.15);
    margin: 40px 0;
    position: relative;
  }
  .cut-line::before {
    content: '✂ recortar';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    padding: 0 12px;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
  }

  @media print {
    body { background: white; padding: 10px; }
    .page-title h1 { color: #333; -webkit-text-fill-color: #333; }
    .page-title p { color: #666; }
    .year-label { color: #333 !important; }
    .card { box-shadow: none; border-width: 2px; break-inside: avoid; }
    .cards-grid { gap: 12px; }
    .cut-line { border-top: 1px dashed #ccc; }
    .cut-line::before { background: white; color: #ccc; }
    .print-tip { display: none; }
  }
</style>

function renderCards(yearKey, containerId) {
  const { cls, cards } = data[yearKey];
  const container = document.getElementById(containerId);
  cards.forEach(card => {
    const div = document.createElement('div');
    div.className = `card ${cls}`;
    div.innerHTML = `
      <div class="card-header">
        <span class="flag">⭐</span>
        <span class="label">Tarjeta de Identidad</span>
      </div>
      <div class="card-name">${card.name}</div>
      <ul class="card-lines">
        ${card.lines.map(l => `
          <li>
            <span class="icon">${l.icon}</span>
            <span>${l.text}${l.tr ? `<span class="translation">${l.tr}</span>` : ''}</span>
          </li>`).join('')}
      </ul>`;
    container.appendChild(div);
  });
}
