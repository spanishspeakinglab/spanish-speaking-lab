<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Verbos 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2rem;
    background: linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    text-align: center;
  }
  .subtitle {
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }

  .verb-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }
  .chip {
    padding: 5px 14px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 800;
    cursor: pointer;
    border: 2px solid;
    transition: opacity 0.2s;
    color: white;
  }
  .chip.off { opacity: 0.3; }
  .chip.ar { background: rgba(255,107,107,0.4); border-color: #FF6B6B; }
  .chip.er { background: rgba(78,205,196,0.4); border-color: #4ECDC4; }
  .chip.ir { background: rgba(199,125,255,0.4); border-color: #C77DFF; }

  .main {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 900px;
  }

  .wheel-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .wheel-wrap {
    position: relative;
    width: 300px;
    height: 300px;
  }
  .pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.8rem;
    z-index: 10;
    line-height: 1;
  }
  #wheelCanvas {
    display: block;
    border-radius: 50%;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  #spinBtn {
    font-family: 'Pacifico', cursive;
    font-size: 1.1rem;
    padding: 12px 36px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #FF6B6B, #FF9A3C);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,107,107,0.5);
    transition: transform 0.1s;
  }
  #spinBtn:hover { transform: scale(1.04); }
  #spinBtn:active { transform: scale(0.97); }
  #spinBtn:disabled { opacity: 0.5; cursor: default; transform: none; }

  .result-side {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 260px;
    max-width: 320px;
  }

  .result-box {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .result-box.lit {
    border-color: #FFE66D;
    background: rgba(255,230,109,0.07);
  }
  .res-emoji { font-size: 2.8rem; }
  .res-hint { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.35); }
  .res-verb { font-family: 'Pacifico', cursive; font-size: 1.7rem; color: #FFE66D; }
  .res-person { font-size: 1rem; font-weight: 900; color: #4ECDC4; }
  #revealBtn {
    margin-top: 6px;
    background: none;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    color: rgba(255,255,255,0.45);
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 800;
    padding: 5px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #revealBtn:hover { border-color: #6BCB77; color: #6BCB77; }
  #revealBtn.shown { border-color: #6BCB77; color: #6BCB77; font-size: 1rem; }

  .conj-box {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px;
  }
  .conj-label {
    font-size: 0.68rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.3);
    margin-bottom: 10px;
    text-align: center;
  }
  .conj-grid { display: flex; flex-direction: column; gap: 5px; }
  .conj-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .conj-row:hover { background: rgba(255,255,255,0.06); }
  .conj-row.hl { background: rgba(255,230,109,0.12); border: 1px solid rgba(255,230,109,0.3); }
  .cperson { font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.4); width: 52px; }
  .cverb-name { font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.3); width: 68px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cform { font-size: 0.95rem; font-weight: 900; flex: 1; }
  .cform.ar { color: #FF6B6B; }
  .cform.er { color: #4ECDC4; }
  .cform.ir { color: #C77DFF; }

  .cf {
    position: fixed;
    pointer-events: none;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(600deg); opacity: 0; }
  }
</style>
</head>
<body>

<h1>🎯 Ruleta de Verbos</h1>
<div class="subtitle">Activa o desactiva verbos · gira · ¡conjuga!</div>
<div class="verb-chips" id="chips"></div>

<div class="main">
  <div class="wheel-side">
    <div class="wheel-wrap">
      <div class="pointer">▼</div>
      <canvas id="wheelCanvas" width="300" height="300"></canvas>
    </div>
    <button id="spinBtn">¡Girar! 🎯</button>
  </div>
  <div class="result-side">
    <div class="result-box" id="resultBox">
      <div class="res-emoji">🎯</div>
      <div class="res-hint">Gira la ruleta</div>
      <div class="res-verb" style="color:rgba(255,255,255,0.15)">—</div>
      <div class="res-person" style="color:rgba(255,255,255,0.15)">—</div>
    </div>
    <div class="conj-box">
      <div class="conj-label">📋 Tabla de conjugación</div>
      <div class="conj-grid" id="conjGrid"></div>
    </div>
  </div>
</div>

<script>
var VERBS = [
  { id:'hablar',   type:'ar', emoji:'🗣️', color:'#FF6B6B', conj:{ yo:'hablo',   tú:'hablas',   'él/ella':'habla'   } },
  { id:'escuchar', type:'ar', emoji:'👂', color:'#FF9A3C', conj:{ yo:'escucho',  tú:'escuchas',  'él/ella':'escucha'  } },
  { id:'comer',    type:'er', emoji:'🍜', color:'#4ECDC4', conj:{ yo:'como',    tú:'comes',    'él/ella':'come'    } },
  { id:'beber',    type:'er', emoji:'🥤', color:'#45B7D1', conj:{ yo:'bebo',    tú:'bebes',    'él/ella':'bebe'    } },
  { id:'vivir',    type:'ir', emoji:'🏠', color:'#C77DFF', conj:{ yo:'vivo',    tú:'vives',    'él/ella':'vive'    } },
  { id:'escribir', type:'ir', emoji:'✏️', color:'#9B59B6', conj:{ yo:'escribo', tú:'escribes', 'él/ella':'escribe' } }
];
var PERSONS = ['yo','tú','él/ella'];
var PEMOJI  = { yo:'🙋', tú:'👉', 'él/ella':'👤' };

var active  = {};
VERBS.forEach(function(v){ active[v.id] = true; });

var spinning  = false;
var rotation  = 0;
var lastVerb  = null;
var lastPerson = null;

// ── CHIPS ────────────────────────────────────────────────────────────────────
var chipsEl = document.getElementById('chips');
VERBS.forEach(function(v){
  var chip = document.createElement('button');
  chip.className = 'chip ' + v.type;
  chip.textContent = v.emoji + ' ' + v.id;
  chip.addEventListener('click', function(){
    if(active[v.id]){
      var count = 0;
      Object.keys(active).forEach(function(k){ if(active[k]) count++; });
      if(count <= 1) return;
      active[v.id] = false;
      chip.classList.add('off');
    } else {
      active[v.id] = true;
      chip.classList.remove('off');
    }
    drawWheel(rotation);
    buildConjTable(lastVerb, lastPerson);
  });
  chipsEl.appendChild(chip);
});

// ── CANVAS ───────────────────────────────────────────────────────────────────
var canvas = document.getElementById('wheelCanvas');
var ctx    = canvas.getContext('2d');
var CX = 150, CY = 150, R = 146;

function getSegs(){
  var segs = [];
  VERBS.forEach(function(v){
    if(!active[v.id]) return;
    PERSONS.forEach(function(p){
      segs.push({ verb:v, person:p });
    });
  });
  return segs;
}

function drawWheel(rot){
  var segs = getSegs();
  var n    = segs.length;
  if(n === 0) return;
  var arc  = (2 * Math.PI) / n;

  ctx.clearRect(0, 0, 300, 300);

  for(var i = 0; i < n; i++){
    var seg   = segs[i];
    var start = rot + i * arc - Math.PI / 2;
    var end   = start + arc;
    var mid   = start + arc / 2;

    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? seg.verb.color + 'cc' : seg.verb.color + '88';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    var er = R * 0.70;
    ctx.font = '17px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(seg.verb.emoji, CX + er * Math.cos(mid), CY + er * Math.sin(mid));

    var tr = R * 0.42;
    ctx.save();
    ctx.translate(CX + tr * Math.cos(mid), CY + tr * Math.sin(mid));
    ctx.rotate(mid + Math.PI / 2);
    ctx.font = 'bold 10px Arial, sans-serif';
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(seg.person, 0, 0);
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(CX, CY, 25, 0, 2 * Math.PI);
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = '15px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎯', CX, CY);
}

drawWheel(0);

// ── SPIN ─────────────────────────────────────────────────────────────────────
document.getElementById('spinBtn').addEventListener('click', function(){
  if(spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultBox').classList.remove('lit');

  var segs     = getSegs();
  var n        = segs.length;
  var arc      = (2 * Math.PI) / n;
  var extra    = (6 + Math.random() * 6) * 2 * Math.PI;
  var startRot = rotation;
  var endRot   = startRot + extra;
  var dur      = 3000 + Math.random() * 1000;
  var t0       = performance.now();

  function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

  function frame(now){
    var progress = Math.min((now - t0) / dur, 1);
    var cur = startRot + (endRot - startRot) * easeOut(progress);
    rotation = cur;
    drawWheel(cur);

    if(progress < 1){
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;

      var segs2 = getSegs();
      var n2    = segs2.length;
      var arc2  = (2 * Math.PI) / n2;
      var norm  = ((-rotation % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      var idx   = Math.floor(norm / arc2) % n2;
      var seg   = segs2[idx];
      lastVerb   = seg.verb;
      lastPerson = seg.person;
      showResult(seg.verb, seg.person);
    }
  }

  requestAnimationFrame(frame);
});

// ── RESULT ────────────────────────────────────────────────────────────────────
function showResult(verb, person){
  var box = document.getElementById('resultBox');
  box.classList.add('lit');
  box.innerHTML =
    '<div class="res-emoji">'+verb.emoji+'</div>' +
    '<div class="res-hint">Conjuga este verbo:</div>' +
    '<div class="res-verb">'+verb.id+'</div>' +
    '<div class="res-person">'+PEMOJI[person]+' '+person+'</div>' +
    '<button id="revealBtn">👁 Ver respuesta</button>';
  document.getElementById('revealBtn').addEventListener('click', reveal);
  buildConjTable(verb, person);
}

function reveal(){
  if(!lastVerb || !lastPerson) return;
  var answer = lastVerb.conj[lastPerson];
  var btn = document.getElementById('revealBtn');
  if(btn){ btn.textContent = '✅  '+answer; btn.classList.add('shown'); }
  doConfetti();
}

// ── CONJ TABLE ────────────────────────────────────────────────────────────────
function buildConjTable(hlVerb, hlPerson){
  var grid = document.getElementById('conjGrid');
  grid.innerHTML = '';
  VERBS.forEach(function(verb){
    if(!active[verb.id]) return;
    PERSONS.forEach(function(person){
      var row = document.createElement('div');
      var isHl = hlVerb && hlPerson && verb.id === hlVerb.id && person === hlPerson;
      row.className = 'conj-row' + (isHl ? ' hl' : '');
      row.innerHTML =
        '<span class="cperson">'+PEMOJI[person]+' '+person+'</span>' +
        '<span class="cverb-name">'+verb.emoji+' '+verb.id+'</span>' +
        '<span class="cform '+verb.type+'">'+verb.conj[person]+'</span>';
      row.addEventListener('click', function(){ speak(verb.conj[person]); });
      grid.appendChild(row);
    });
  });
}
buildConjTable(null, null);

// ── SPEECH ────────────────────────────────────────────────────────────────────
function speak(text){
  if(!window.speechSynthesis) return;
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  speechSynthesis.speak(u);
}

// ── CONFETTI ──────────────────────────────────────────────────────────────────
function doConfetti(){
  var colors = ['#FF6B6B','#FFE66D','#4ECDC4','#C77DFF','#6BCB77','#FF9A3C'];
  for(var i = 0; i < 50; i++){
    var el = document.createElement('div');
    el.className = 'cf';
    var size = 6 + Math.random() * 8;
    el.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.floor(Math.random()*100)+'vw;top:-'+size+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+(1.5+Math.random()*1.5)+'s;animation-delay:'+(Math.random()*0.5)+'s;';
    document.body.appendChild(el);
    setTimeout(function(e){ return function(){ e.remove(); }; }(el), 3500);
  }
}
</script>
</body>
</html>
