<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡El Play de Saludos! — Spanish Speaking Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: #0d1117;
  min-height: 100vh;
  padding: 20px;
  color: #fff;
}

/* ── Stage background ── */
.stage {
  max-width: 820px;
  margin: 0 auto;
}

.top-bar {
  text-align: center;
  margin-bottom: 28px;
}
.top-bar .brand {
  font-size: 0.72rem;
  font-weight: 800;
  color: #444;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.top-bar h1 {
  font-family: 'Pacifico', cursive;
  font-size: 2.4rem;
  background: linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.top-bar .instruccion {
  font-size: 0.88rem;
  font-weight: 700;
  color: #666;
}

/* ── Year selector ── */
.year-tabs {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.year-tab {
  padding: 8px 22px;
  border-radius: 50px;
  border: 2.5px solid #333;
  background: transparent;
  color: #666;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
}
.year-tab:hover { border-color: #666; color: #aaa; }
.year-tab.active { border-color: var(--accent); background: var(--accent); color: white; }
.year-tab[data-year="7"] { --accent: #FF6B6B; }
.year-tab[data-year="8"] { --accent: #45B7D1; }
.year-tab[data-year="9"] { --accent: #6BCB77; }

/* ── Mode selector ── */
.mode-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 28px;
}
.mode-btn {
  padding: 7px 18px;
  border-radius: 50px;
  border: 2px solid #333;
  background: transparent;
  color: #555;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.mode-btn.active { border-color: #FFE66D; background: rgba(255,230,109,0.1); color: #FFE66D; }

/* ── Play area ── */
.play-area {
  background: #161b22;
  border-radius: 24px;
  border: 2px solid #21262d;
  padding: 28px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.play-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4, #C77DFF);
}

/* ── Characters ── */
.characters {
  display: flex;
  justify-content: space-around;
  align-items: flex-end;
  margin-bottom: 24px;
  gap: 20px;
}
.character {
  text-align: center;
  flex: 1;
}
.char-avatar {
  font-size: 3.5rem;
  display: block;
  margin-bottom: 6px;
  transition: transform 0.3s;
  filter: grayscale(0.3);
}
.character.speaking .char-avatar {
  transform: scale(1.15);
  filter: grayscale(0);
  animation: bounce 0.4s ease;
}
@keyframes bounce {
  0% { transform: scale(1.15) translateY(0); }
  50% { transform: scale(1.15) translateY(-8px); }
  100% { transform: scale(1.15) translateY(0); }
}
.char-name {
  font-size: 0.8rem;
  font-weight: 800;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.character.speaking .char-name { color: #FFE66D; }

/* Mode: group of 3 */
.char-group {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex: 1;
}
.char-small {
  text-align: center;
}
.char-small .char-avatar { font-size: 2.4rem; }

/* ── Dialogue bubble ── */
.dialogue-wrap {
  margin-bottom: 20px;
  min-height: 120px;
}
.bubble {
  border-radius: 20px;
  padding: 16px 20px;
  margin-bottom: 10px;
  position: relative;
  max-width: 85%;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
  display: none;
}
.bubble.visible {
  opacity: 1;
  transform: translateY(0);
  display: block;
}
.bubble.left { margin-right: auto; border-bottom-left-radius: 4px; }
.bubble.right { margin-left: auto; border-bottom-right-radius: 4px; }
.bubble.center { margin: 0 auto; border-radius: 20px; text-align: center; }

.bubble .who {
  font-size: 0.65rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 0.6;
}
.bubble .spanish {
  font-size: 1.2rem;
  font-weight: 900;
  margin-bottom: 4px;
}
.bubble .english {
  font-size: 0.78rem;
  font-weight: 600;
  opacity: 0.55;
}
.bubble .your-turn {
  font-size: 0.75rem;
  font-weight: 800;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Bubble colors by speaker */
.bubble.persona-a { background: rgba(255,107,107,0.15); border: 1.5px solid rgba(255,107,107,0.3); }
.bubble.persona-a .who { color: #FF6B6B; }
.bubble.persona-a .spanish { color: #FF6B6B; }
.bubble.persona-a .your-turn { color: #FF6B6B; }

.bubble.persona-b { background: rgba(78,205,196,0.15); border: 1.5px solid rgba(78,205,196,0.3); }
.bubble.persona-b .who { color: #4ECDC4; }
.bubble.persona-b .spanish { color: #4ECDC4; }
.bubble.persona-b .your-turn { color: #4ECDC4; }

.bubble.persona-c { background: rgba(199,125,255,0.15); border: 1.5px solid rgba(199,125,255,0.3); }
.bubble.persona-c .who { color: #C77DFF; }
.bubble.persona-c .spanish { color: #C77DFF; }
.bubble.persona-c .your-turn { color: #C77DFF; }

/* ── Progress ── */
.progress-bar {
  height: 4px;
  background: #21262d;
  border-radius: 4px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF6B6B, #FFE66D, #4ECDC4);
  border-radius: 4px;
  transition: width 0.4s ease;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.btn-next {
  padding: 12px 32px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #FF6B6B, #FFE66D);
  color: #111;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(255,107,107,0.3);
}
.btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,107,107,0.4); }
.btn-next:active { transform: translateY(0); }
.btn-restart {
  padding: 10px 20px;
  border-radius: 50px;
  border: 2px solid #333;
  background: transparent;
  color: #555;
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-restart:hover { border-color: #555; color: #888; }

.step-counter {
  font-size: 0.78rem;
  font-weight: 800;
  color: #444;
}

/* ── Fin card ── */
.fin-card {
  text-align: center;
  padding: 30px;
  display: none;
}
.fin-card .trophy { font-size: 4rem; margin-bottom: 12px; }
.fin-card h2 { font-family: 'Pacifico', cursive; font-size: 2rem; color: #FFE66D; margin-bottom: 8px; }
.fin-card p { color: #666; font-size: 0.9rem; font-weight: 700; }

/* ── Vocab box ── */
.vocab-box {
  background: #161b22;
  border-radius: 16px;
  border: 1.5px solid #21262d;
  padding: 20px 24px;
}
.vocab-box h3 {
  font-size: 0.72rem;
  font-weight: 800;
  color: #444;
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 14px;
  text-align: center;
}
.vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.vocab-item {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 8px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.vocab-item .v-sp { font-size: 0.88rem; font-weight: 800; color: #eee; }
.vocab-item .v-en { font-size: 0.75rem; font-weight: 600; color: #444; }

@media print {
  body { background: white; color: #111; }
  .year-tabs, .mode-selector, .controls, .btn-next, .btn-restart { display: none; }
  .play-area { background: #f9f9f9; border: 2px solid #ddd; }
  .bubble.persona-a { background: #fff0f0; border-color: #FF6B6B; }
  .bubble.persona-b { background: #f0feff; border-color: #4ECDC4; }
  .bubble.persona-c { background: #f8f0ff; border-color: #C77DFF; }
  .bubble { display: block !important; opacity: 1 !important; transform: none !important; }
  .vocab-box { background: #f9f9f9; border-color: #ddd; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

function setYear(y) {
  currentYear = y;
  document.querySelectorAll('.year-tab').forEach(function(t) {
    t.classList.toggle('active', parseInt(t.dataset.year) === y);
  });
  restart();
}

function setMode(m) {
  currentMode = m;
  document.getElementById('mode-pair').classList.toggle('active', m === 'pair');
  document.getElementById('mode-trio').classList.toggle('active', m === 'trio');
  restart();
}

function getScript() {
  return data[currentYear][currentMode];
}

function buildCharacters() {
  var script = getScript();
  var el = document.getElementById('characters');
  el.innerHTML = '';
  script.chars.forEach(function(ch, i) {
    var div = document.createElement('div');
    div.className = 'character';
    div.id = 'char-' + i;
    div.innerHTML = '<span class="char-avatar">' + ch.emoji + '</span><div class="char-name">' + ch.name + '</div>';
    el.appendChild(div);
  });
}

function buildVocab() {
  var vocab = data[currentYear].vocab;
  var box = document.getElementById('vocabBox');
  var items = vocab.map(function(v) {
    return '<div class="vocab-item"><span class="v-sp">' + v.sp + '</span><span class="v-en">' + v.en + '</span></div>';
  }).join('');
  box.innerHTML = '<h3>📖 Vocabulario clave</h3><div class="vocab-grid">' + items + '</div>';
}

function restart() {
  currentStep = 0;
  document.getElementById('finCard').style.display = 'none';
  document.getElementById('dialogueWrap').style.display = 'block';
  document.getElementById('btnNext').style.display = 'inline-block';
  document.getElementById('dialogueWrap').innerHTML = '';
  buildCharacters();
  buildVocab();
  showStep();
}

function showStep() {
  var script = getScript();
  var steps = script.steps;

  // Update progress
  var pct = (currentStep / steps.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCounter').textContent = currentStep + ' / ' + steps.length;

  // Highlight character
  document.querySelectorAll('.character').forEach(function(c) { c.classList.remove('speaking'); });
  if (currentStep < steps.length) {
    var charEl = document.getElementById('char-' + steps[currentStep].speaker);
    if (charEl) charEl.classList.add('speaking');
  }

  if (currentStep >= steps.length) {
    document.getElementById('dialogueWrap').style.display = 'none';
    document.getElementById('finCard').style.display = 'block';
    document.getElementById('btnNext').style.display = 'none';
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('stepCounter').textContent = steps.length + ' / ' + steps.length;
    return;
  }

  var step = steps[currentStep];
  var ch = script.chars[step.speaker];

  var bubble = document.createElement('div');
  bubble.className = 'bubble ' + ch.cls + ' ' + step.side;
  bubble.innerHTML =
    '<div class="who">' + ch.name + '</div>' +
    '<div class="spanish">' + step.spanish + '</div>' +
    '<div class="english">' + step.english + '</div>' +
    '<div class="your-turn"><span>🎙️</span>' + step.yourTurn + '</div>';

  document.getElementById('dialogueWrap').appendChild(bubble);

  requestAnimationFrame(function() {
    bubble.classList.add('visible');
    bubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
}

function nextStep() {
  currentStep++;
  showStep();
}

// Init
restart();
</script>
